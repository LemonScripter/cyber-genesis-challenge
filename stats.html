<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioOS: Verifier & Hall of Fame</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; text-align: center; }
        .stat-box { border: 1px solid var(--axiom-cyan); padding: 1rem; background: rgba(0, 243, 255, 0.05); }
        .stat-val { font-size: 2rem; display: block; color: var(--axiom-cyan); }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.8rem; }
        th, td { border: 1px solid var(--matrix-green); padding: 0.5rem; text-align: left; }
        th { background: rgba(0, 255, 65, 0.1); color: var(--axiom-cyan); }
        .result-blocked { color: var(--matrix-green); }
        .result-bypassed { color: var(--breach-red); }
        .verifier-box { border: 1px solid var(--axiom-cyan); padding: 2rem; margin-top: 2rem; }
        #verify-result { margin-top: 1rem; padding: 1rem; display: none; }
    </style>
</head>
<body>
    <header>
        <div class="logo">BioOS VERIFIER & HALL OF FAME</div>
        <div class="controls">
            <button id="back-btn" onclick="location.href='index.html'">Vissza a Sandbox-ba / Back</button>
            <button id="lang-toggle-stats">EN / HU</button>
        </div>
    </header>

    <main>
        <h1 id="stats-title">Rendszerstatisztikák és hitelesítés</h1>

        <div class="stats-grid">
            <div class="stat-box">
                <span id="label-total" class="stat-label">Összes kísérlet</span>
                <span id="total-attempts" class="stat-val">0</span>
            </div>
            <div class="stat-box">
                <span id="label-blocked" class="stat-label">BioOS által blokkolva</span>
                <span id="blocked-attempts" class="stat-val">0</span>
            </div>
            <div class="stat-box">
                <span id="label-confirmed" class="stat-label">Sikeres feltörés</span>
                <span id="confirmed-breaches" class="stat-val">0</span>
            </div>
        </div>

        <h2 id="recent-title">Legutóbbi próbálkozások</h2>
        <table id="attempts-table">
            <thead>
                <tr>
                    <th id="th-time">Idő</th>
                    <th id="th-cmd">Parancs</th>
                    <th id="th-shield">Pajzs</th>
                    <th id="th-res">Eredmény</th>
                </tr>
            </thead>
            <tbody id="attempts-body">
                <!-- Data populated via JS -->
            </tbody>
        </table>

        <div class="verifier-box">
            <h2 id="verify-title">Kód hitelesítése</h2>
            <p id="verify-text">Itt ellenőrizheti a terminál által generált VERIFICATION_DNA kódot.</p>
            <input type="text" id="verify-input" placeholder="Illessze be a kódot ide..." style="width: 100%; background: #000; border: 1px solid var(--axiom-cyan); color: var(--axiom-cyan); padding: 10px; margin-bottom: 10px;">
            <button id="verify-btn">Hitelesítés / VERIFY</button>
            <div id="verify-result"></div>
        </div>
    </main>

    <script type="module">
        import { getAttempts, verifyHash } from './stats_manager.js';

        const statsContent = {
            hu: {
                title: "Rendszerstatisztikák és hitelesítés",
                total: "Összes kísérlet",
                blocked: "BioOS által blokkolva",
                confirmed: "Sikeres feltörés",
                recent: "Legutóbbi próbálkozások",
                thTime: "Idő",
                thCmd: "Parancs",
                thShield: "Pajzs",
                thRes: "Eredmény",
                verifyTitle: "Kód hitelesítése",
                verifyText: "Itt ellenőrizheti a terminál által generált VERIFICATION_DNA kódot.",
                verifyPlaceholder: "Illessze be a kódot ide...",
                verifyBtn: "Hitelesítés",
                back: "Vissza a Sandbox-ba",
                vSuccess: "HITELESÍTVE: Valódi feltörés észlelve!",
                vFail: "HAMISÍTOTT: A kód érvénytelen."
            },
            en: {
                title: "System Stats & Verification",
                total: "Total attempts",
                blocked: "Blocked by BioOS",
                confirmed: "Confirmed breaches",
                recent: "Recent attempts",
                thTime: "Time",
                thCmd: "Command",
                thShield: "Shield",
                thRes: "Result",
                verifyTitle: "Code Verification",
                verifyText: "Verify the VERIFICATION_DNA code generated by the terminal.",
                verifyPlaceholder: "Paste code here...",
                verifyBtn: "Verify",
                back: "Back to Sandbox",
                vSuccess: "VERIFIED: Genuine breach detected!",
                vFail: "FAKE: Invalid verification code."
            }
        };

        let currentLang = localStorage.getItem('bioos_lang') || 'hu';

        function updateStatsUI() {
            const c = statsContent[currentLang];
            document.getElementById('stats-title').innerText = c.title;
            document.getElementById('label-total').innerText = c.total;
            document.getElementById('label-blocked').innerText = c.blocked;
            document.getElementById('label-confirmed').innerText = c.confirmed;
            document.getElementById('recent-title').innerText = c.recent;
            document.getElementById('th-time').innerText = c.thTime;
            document.getElementById('th-cmd').innerText = c.thCmd;
            document.getElementById('th-shield').innerText = c.thShield;
            document.getElementById('th-res').innerText = c.thRes;
            document.getElementById('verify-title').innerText = c.verifyTitle;
            document.getElementById('verify-text').innerText = c.verifyText;
            document.getElementById('verify-input').placeholder = c.verifyPlaceholder;
            document.getElementById('verify-btn').innerText = c.verifyBtn;
            document.getElementById('back-btn').innerText = c.back;
            
            renderTable();
        }

        async function renderTable() {
            const attempts = await getAttempts();
            document.getElementById('total-attempts').innerText = attempts.length;
            document.getElementById('blocked-attempts').innerText = attempts.filter(a => a.result === 'UNSAT').length;

            const body = document.getElementById('attempts-body');
            body.innerHTML = '';
            attempts.slice(0, 20).forEach(a => {
                const row = body.insertRow();
                row.insertCell(0).innerText = a.time;
                row.insertCell(1).innerText = a.cmd;
                row.insertCell(2).innerText = a.shield ? 'ON' : 'OFF';
                const resCell = row.insertCell(3);
                resCell.innerText = a.result === 'SAT' ? 'BYPASSED' : 'BLOCKED';
                resCell.className = a.result === 'SAT' ? 'result-bypassed' : 'result-blocked';
            });
        }

        document.getElementById('lang-toggle-stats').addEventListener('click', () => {
            currentLang = currentLang === 'hu' ? 'en' : 'hu';
            localStorage.setItem('bioos_lang', currentLang);
            updateStatsUI();
        });

        document.getElementById('verify-btn').addEventListener('click', async () => {
            const hash = document.getElementById('verify-input').value;
            const resBox = document.getElementById('verify-result');
            resBox.style.display = 'block';
            
            const isValid = await verifyHash(hash); 
            const c = statsContent[currentLang];

            if(isValid) {
                resBox.style.background = 'rgba(0, 255, 65, 0.2)';
                resBox.innerText = c.vSuccess;
            } else {
                resBox.style.background = 'rgba(255, 0, 51, 0.2)';
                resBox.innerText = c.vFail;
            }
        });

        updateStatsUI();
    </script>
</body>
</html>
